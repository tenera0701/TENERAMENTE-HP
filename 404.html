<!doctype html>
<html lang="ja" data-variant="t" class="js">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ページが見つかりません｜株式会社TENERAMENTE</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="assets/img/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="assets/img/favicon-180.png" />
<link rel="stylesheet" href="assets/kintone.css" />
<style>
.nf { min-height: 60vh; display: grid; place-items: center; text-align: center; padding: clamp(48px,8vw,120px) var(--gutter); }
.nf .code { font-family: var(--font-disp); font-weight: 900; font-size: clamp(72px,14vw,140px); color: var(--blue-soft); line-height: 1; }
.nf h1 { font-family: var(--font-disp); font-weight: 900; font-size: clamp(20px,3vw,28px); margin-top: 12px; }
.nf p { color: var(--ink-soft); margin-top: 14px; font-size: 15px; }
.nf .ctas { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
.k-mobile { display:none; position:fixed; inset:74px 0 auto 0; background:#fff; border-bottom:1px solid var(--line); padding:16px var(--gutter) 24px; z-index:99; box-shadow:var(--shadow-md); }
.k-mobile.open { display:block; }
.k-mobile a { display:block; font-family:var(--font-disp); font-weight:700; padding:12px 0; border-bottom:1px solid var(--line-soft); color:var(--ink); }
.k-mobile .btn { width:100%; margin-top:16px; }
</style>
</head>
<body data-active="">

<div data-chrome="header"></div>

<section class="nf">
  <div>
    <div class="code">404</div>
    <h1>お探しのページが見つかりませんでした</h1>
    <p>URLが変更されたか、ページが削除された可能性があります。</p>
    <div class="ctas">
      <a href="index.html" class="btn btn-primary btn-lg">トップページへ<span class="arr">→</span></a>
      <a href="blog.html" class="btn btn-ghost btn-lg">ブログ一覧へ</a>
    </div>
  </div>
</section>

<div data-chrome="footer"></div>

<script src="assets/chrome.js"></script>
<script src="assets/kintone.js"></script>
</body>
</html>
