<style>
.page-hero { background: transparent; overflow:hidden; padding-block: clamp(44px,6vw,84px) clamp(28px,4vw,48px); position:relative; }
.page-hero h1 { font-family:var(--font-disp); font-weight:900; font-size:clamp(34px,5.4vw,58px); line-height:1.18; }
.page-hero h1 .b { color:var(--blue); }
.page-hero .lead { margin-top:18px; font-size:clamp(15px,1.5vw,18px); color:var(--ink-soft); max-width:50ch; }
.crumb { font-family:var(--font-disp); font-weight:700; font-size:12px; color:var(--ink-faint); margin-bottom:16px; }
.crumb a { color:var(--ink-faint); }

/* filters */
.blog-filters { display:flex; gap:12px; flex-wrap:wrap; padding:18px var(--gutter); border-top:1px solid var(--line); border-bottom:1px solid var(--line); position:sticky; top:74px; background:rgba(255,255,255,0.9); backdrop-filter:blur(12px); z-index:20; justify-content:space-between; align-items:center; }
.blog-filters .tabs { display:flex; gap:8px; flex-wrap:wrap; }
.blog-filters .tab { font-family:var(--font-disp); font-weight:700; font-size:13px; padding:8px 16px; border-radius:999px; border:2px solid var(--line); color:var(--ink-soft); cursor:pointer; background:#fff; transition:all .18s; }
.blog-filters .tab:hover { border-color:var(--blue-soft); color:var(--blue-deep); }
.blog-filters .tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }
.blog-filters .count { font-family:var(--font-disp); font-weight:700; font-size:12px; color:var(--ink-faint); }

/* featured */
.featured { padding: clamp(32px,5vw,56px) 0; }
.featured-card { display:grid; grid-template-columns:1.25fr 1fr; gap:clamp(24px,4vw,56px); align-items:center; border:1px solid var(--line); border-radius:var(--radius-xl); padding:clamp(24px,4vw,52px); background:#fff; box-shadow:var(--shadow-sm); position:relative; overflow:hidden; transition:transform .2s,box-shadow .2s; }
.featured-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); }
.featured-tag { display:inline-flex; align-items:center; gap:7px; font-family:var(--font-disp); font-weight:700; font-size:12px; color:var(--blue-deep); background:var(--blue-soft); padding:6px 14px; border-radius:999px; }
.featured-tag::before { content:'★'; }
.featured-card h2 { font-family:var(--font-disp); font-weight:900; font-size:clamp(24px,3.2vw,40px); line-height:1.3; margin-top:16px; }
.featured-card h2 a { color:var(--ink); }
.featured-card h2 a:hover { color:var(--blue); }
.featured-card .lead { margin-top:16px; font-size:15px; color:var(--ink-soft); line-height:1.8; max-width:46ch; }
.featured-card .meta { margin-top:20px; display:flex; gap:12px; align-items:center; font-family:var(--font-disp); font-weight:700; font-size:12px; color:var(--ink-faint); }
.featured-card .meta .dot { width:4px; height:4px; border-radius:50%; background:var(--ink-faint); }
.featured-visual { aspect-ratio:5/4; border-radius:var(--radius-lg); background:linear-gradient(135deg,var(--blue),var(--blue-deep)); display:grid; place-items:center; position:relative; overflow:hidden; }
.featured-visual .glyph { font-family:var(--font-disp); font-weight:900; font-size:clamp(72px,12vw,160px); color:rgba(255,255,255,0.92); }
@media(max-width:800px){ .featured-card{ grid-template-columns:1fr; } .featured-visual{ order:-1; } }

/* article grid */
.articles { padding: clamp(20px,3vw,40px) 0 clamp(48px,7vw,90px); }
.articles-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:26px; }
.article-card { display:flex; flex-direction:column; gap:13px; color:var(--ink); background:#fff; border:1px solid var(--line); border-radius:var(--radius-lg); padding:16px; box-shadow:var(--shadow-sm); transition:transform .2s,box-shadow .2s; }
.article-card.hidden { display:none; }
.article-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-md); }
.article-card:hover h3 { color:var(--blue); }
.article-card .visual { aspect-ratio:16/10; border-radius:var(--radius-md); position:relative; overflow:hidden; display:grid; place-items:center; background:linear-gradient(135deg,#e8f4fc,#cfe9fb); }
.article-card .visual.v-violet { background:linear-gradient(135deg,#efeafe,#ddd2fb); }
.article-card .visual.v-cyan { background:linear-gradient(135deg,#e3f7f6,#c7eeed); }
.article-card .visual.v-green { background:linear-gradient(135deg,#eafaf0,#cdeed8); }
.article-card .visual.v-amber { background:linear-gradient(135deg,#fff3e0,#ffe2bd); }
.article-card .visual .gl-text { font-family:var(--font-disp); font-weight:900; font-size:64px; color:rgba(255,255,255,0.95); text-shadow:0 4px 14px rgba(0,0,0,.12); }
.article-card .meta-row { display:flex; gap:8px; align-items:center; font-family:var(--font-disp); font-weight:700; font-size:11px; color:var(--ink-faint); margin-top:4px; }
.article-card .meta-row .cat { color:var(--blue-deep); background:var(--blue-soft); padding:3px 10px; border-radius:999px; }
.article-card .meta-row .dot { width:3px; height:3px; border-radius:50%; background:currentColor; }
.article-card h3 { font-family:var(--font-disp); font-weight:700; font-size:18px; line-height:1.45; transition:color .18s; }
.article-card p { font-size:13px; color:var(--ink-soft); line-height:1.7; }
.article-card .read { font-family:var(--font-disp); font-weight:700; font-size:11px; color:var(--blue-deep); margin-top:auto; display:flex; align-items:center; gap:6px; }
.article-card .read::after { content:'→'; transition:transform .18s; }
.article-card:hover .read::after { transform:translateX(3px); }
@media(max-width:900px){ .articles-grid{ grid-template-columns:1fr 1fr; gap:20px; } }
@media(max-width:600px){ .articles-grid{ grid-template-columns:1fr; } }

.k-mobile { display:none; position:fixed; inset:74px 0 auto 0; background:#fff; border-bottom:1px solid var(--line); padding:16px var(--gutter) 24px; z-index:99; box-shadow:var(--shadow-md); }
.k-mobile.open { display:block; }
.k-mobile a { display:block; font-family:var(--font-disp); font-weight:700; padding:12px 0; border-bottom:1px solid var(--line-soft); color:var(--ink); }
.k-mobile .btn { width:100%; margin-top:16px; }
</style>
</head>

<div data-chrome="footer"></div>
