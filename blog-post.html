.post-hero { max-width:980px; margin:0 auto; padding: clamp(36px,5vw,64px) var(--gutter) 24px; position:relative; }

.post-cover-inner { aspect-ratio:16/7; border-radius:var(--radius-xl); background:linear-gradient(135deg,var(--blue),var(--blue-deep)); display:grid; place-items:center; position:relative; overflow:hidden; box-shadow:var(--shadow-md); }

.post-cover-inner .big-glyph { font-family:var(--font-disp); font-weight:900; font-size:clamp(100px,20vw,300px); color:rgba(255,255,255,0.92); position:relative; }

.post-wrap { display:grid; grid-template-columns:220px 1fr; gap:clamp(20px,4vw,72px); max-width:1140px; margin:56px auto; padding:0 var(--gutter); align-items:start; }
.post-aside { position:sticky; top:96px; }
.toc-title { font-family:var(--font-disp); font-weight:700; font-size:11px; letter-spacing:0.1em; color:var(--ink-faint); margin-bottom:14px; }
.toc { display:flex; flex-direction:column; }
.toc a { color:var(--ink-soft); font-size:13px; padding:8px 0 8px 14px; border-left:2px solid var(--line); transition:all .18s; line-height:1.5; }
.toc a:hover, .toc a.active { color:var(--blue-deep); border-left-color:var(--blue); }
.toc a .n { font-family:var(--font-disp); font-weight:700; font-size:10px; color:var(--ink-faint); margin-right:6px; }

.post-body { font-size:16.5px; line-height:1.95; color:var(--ink); max-width:70ch; }
.post-body h2 { font-family:var(--font-disp); font-weight:900; font-size:clamp(23px,3vw,34px); line-height:1.3; margin:56px 0 18px; scroll-margin-top:96px; }
.post-body h2 .h-num { font-family:var(--font-disp); font-weight:700; font-size:12px; color:var(--blue); letter-spacing:0.12em; display:block; margin-bottom:8px; }

.post-body blockquote { margin:32px 0; padding:22px 28px; border-left:4px solid var(--blue); background:var(--blue-mist); border-radius:0 var(--radius-md) var(--radius-md) 0; font-size:20px; line-height:1.6; color:var(--ink); font-weight:500; }

.post-body hr { border:none; border-top:1px solid var(--line); margin:48px 0; }

.post-body .table-wrap { overflow-x:auto; margin:28px 0; }
.post-body table { border-collapse:collapse; width:100%; font-size:14.5px; background:#fff; border:1px solid var(--line); border-radius:var(--radius-md); overflow:hidden; }
.post-body th, .post-body td { text-align:left; padding:12px 16px; border-bottom:1px solid var(--line-soft); vertical-align:top; }
.post-body thead th { background:var(--blue-soft); color:var(--blue-ink); font-family:var(--font-disp); font-weight:700; font-size:13px; white-space:nowrap; }
.post-body tbody tr:last-child td { border-bottom:none; }

.post-body .callout.warn { background:#fff8ec; border-color:#ffe2b0; }
