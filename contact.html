<html lang="ja" data-variant="t" class="js">
<head>
<meta charset="utf-8" />

<title>お問い合わせ｜株式会社TENERAMENTE</title>
<meta name="description" content="株式会社TENERAMENTEへのお問い合わせ。3ステップ・約60秒で送信完了。1営業日以内に代表よりご返信します。" />
<link rel="canonical" href="https://teneramente.jp/contact.html" />

<style>
.cshell { background: transparent; min-height:100vh; padding-block: clamp(40px,6vw,72px) clamp(40px,6vw,72px); overflow:hidden; position:relative; }
.cgrid { max-width:760px; margin:0 auto; }
.cinfo .crumb { font-family:var(--font-disp); font-weight:700; font-size:12px; color:var(--ink-faint); margin-bottom:18px; }
.cinfo .crumb a { color:var(--ink-faint); }
.cinfo h1 { font-family:var(--font-disp); font-weight:900; font-size:clamp(32px,5vw,56px); line-height:1.18; text-wrap:balance; }
.cinfo h1 .b { color:var(--blue); }
.cinfo p { font-size:15px; color:var(--ink-soft); line-height:1.85; max-width:38ch; margin-top:22px; }
.channels { margin-top:30px; display:flex; flex-direction:column; gap:0; }
.channels .ch { display:grid; grid-template-columns:90px 1fr; gap:14px; padding:13px 0; border-top:1px solid var(--line); align-items:baseline; }
.channels .ch:last-child{ border-bottom:1px solid var(--line); }
.channels .k { font-family:var(--font-disp); font-weight:700; font-size:11px; color:var(--blue-deep); letter-spacing:0.06em; }
.channels .v { font-size:14px; color:var(--ink); }
@media(min-width:901px){ .cinfo{ position:sticky; top:96px; } }

.form-card { background:#fff; border:1px solid var(--line); border-radius:var(--radius-xl); box-shadow:var(--shadow-md); padding:clamp(26px,3.4vw,42px); position:relative; overflow:hidden; }
.form-card::before { content:''; position:absolute; inset:0 0 auto 0; height:5px; background:linear-gradient(90deg,var(--blue),var(--accent-green),var(--accent-yellow)); }
.steps { display:flex; gap:6px; margin-bottom:22px; }
.steps .seg { flex:1; height:5px; background:var(--line); border-radius:3px; overflow:hidden; position:relative; }
.steps .seg.done { background:var(--blue); }
.steps .seg.cur::after { content:''; position:absolute; inset:0; background:var(--blue); animation:progSeg 1.4s ease-in-out infinite; }
@keyframes progSeg { 0%{transform:translateX(-100%)} 50%{transform:translateX(0)} 100%{transform:translateX(100%)} }
.step-meta { display:flex; justify-content:space-between; margin-bottom:24px; font-family:var(--font-disp); font-weight:700; font-size:11px; letter-spacing:0.06em; color:var(--ink-faint); }
.step-meta strong { color:var(--blue-deep); }
.step-title { font-family:var(--font-disp); font-weight:900; font-size:clamp(22px,3vw,30px); line-height:1.25; margin-bottom:8px; }
.step-sub { font-size:13.5px; color:var(--ink-soft); margin-bottom:24px; }
.step { display:none; } .step.active { display:block; animation:stepIn .45s cubic-bezier(.2,.7,.2,1); }
@keyframes stepIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.svc-opts { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.svc-opts label { cursor:pointer; padding:16px; border:2px solid var(--line); border-radius:var(--radius-md); display:flex; flex-direction:column; gap:5px; transition:all .18s; position:relative; }
.svc-opts label:hover { border-color:var(--blue-soft); background:var(--blue-mist); }
.svc-opts label input { position:absolute; opacity:0; }
.svc-opts label .o-n { font-family:var(--font-disp); font-weight:700; font-size:10px; color:var(--ink-faint); letter-spacing:0.06em; }
.svc-opts label .o-t { font-family:var(--font-disp); font-weight:700; font-size:15px; }
.svc-opts label .o-d { font-size:12px; color:var(--ink-soft); line-height:1.6; }
.svc-opts label.selected { border-color:var(--blue); background:var(--blue-mist); }
.svc-opts label.selected .o-n { color:var(--blue-deep); }
.svc-opts label.selected::after { content:'✓'; position:absolute; top:12px; right:12px; width:22px; height:22px; background:var(--blue); color:#fff; border-radius:50%; display:grid; place-items:center; font-size:12px; font-weight:700; }

.field { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
.field > label { font-family:var(--font-disp); font-weight:700; font-size:12px; color:var(--ink-soft); display:flex; justify-content:space-between; }
.field .req { color:var(--accent-coral); }
.field input, .field textarea, .field select { font-family:var(--font-body); background:#fff; color:var(--ink); border:2px solid var(--line); border-radius:var(--radius-sm); padding:13px 15px; font-size:15px; outline:none; transition:border-color .18s; }
.field input:focus, .field textarea:focus, .field select:focus { border-color:var(--blue); }
.field input.err { border-color:var(--accent-coral); }
.field textarea { resize:vertical; min-height:120px; line-height:1.7; }
.field .err-msg { font-size:11px; color:var(--accent-coral); font-weight:700; display:none; }
.field.err .err-msg { display:block; }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

.review-list { display:flex; flex-direction:column; border-top:1px solid var(--line); margin-bottom:16px; }
.review-list .rr { display:grid; grid-template-columns:130px 1fr; padding:13px 0; border-bottom:1px solid var(--line-soft); gap:16px; align-items:baseline; }
.review-list .rr .rk { font-family:var(--font-disp); font-weight:700; font-size:11px; color:var(--blue-deep); letter-spacing:0.06em; }
.review-list .rr .rv { font-size:14px; color:var(--ink); line-height:1.6; }
.review-list .rr .rv.empty { color:var(--ink-faint); }
.consent { display:flex; gap:11px; align-items:flex-start; font-size:13px; color:var(--ink-soft); padding:14px; border:2px solid var(--line); border-radius:var(--radius-sm); }
.consent input { margin-top:3px; accent-color:var(--blue); width:18px; height:18px; }
.consent a { color:var(--blue-deep); text-decoration:underline; }

.step-nav { display:flex; justify-content:space-between; margin-top:30px; gap:12px; }
.success { text-align:center; padding:36px 16px; }
.success .check { width:80px; height:80px; margin:0 auto 22px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--accent-green)); display:grid; place-items:center; color:#fff; font-size:36px; box-shadow:var(--shadow-btn); animation:pop .6s cubic-bezier(.2,1.4,.4,1); }
@keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
.success h2 { font-family:var(--font-disp); font-weight:900; font-size:clamp(26px,4vw,38px); }
.success p { color:var(--ink-soft); margin-top:14px; }
@media(max-width:560px){ .svc-opts, .row-2 { grid-template-columns:1fr; } }
.k-mobile { display:none; position:fixed; inset:74px 0 auto 0; background:#fff; border-bottom:1px solid var(--line); padding:16px var(--gutter) 24px; z-index:99; box-shadow:var(--shadow-md); }
.k-mobile.open { display:block; }
.k-mobile a { display:block; font-family:var(--font-disp); font-weight:700; padding:12px 0; border-bottom:1px solid var(--line-soft); color:var(--ink); }
.k-mobile .btn { width:100%; margin-top:16px; }
</style>

</head>
<body data-active="">

<div data-chrome="header"></div>

<section class="cshell" data-screen-label="お問い合わせ">
  <div class="deco" aria-hidden="true">
    <span class="blob blob-blue" style="width:300px;height:300px;right:-60px;top:-80px;"></span>
    <span class="blob blob-yellow" style="width:200px;height:200px;left:-50px;bottom:-30px;"></span>
    <span class="shape ring c-coral float-a" style="width:40px;height:40px;left:6%;top:40%;"></span>
  </div>
  <div class="wrap-wide cgrid">

    <main class="form-card reveal d1">
      <div class="steps" id="steps"><div class="seg cur"></div><div class="seg"></div></div>
      <div class="step-meta"><span><strong id="stepCur">01</strong> / 02</span><span id="stepName">ご相談内容</span></div>

      <form id="contactForm" novalidate>
        <!-- STEP 1 -->
        <div class="step active" data-step="1">
          <h2 class="step-title">どんなご相談ですか？</h2>
          <p class="step-sub">複数選択できます。「その他」でも構いません。</p>
          <div class="svc-opts">
            <label data-val="app"><span class="o-n">01 / WEB APP</span><span class="o-t">AI×WEBアプリ開発</span><span class="o-d">業務アプリ・予約・CRMなど</span><input type="checkbox" name="svc" value="app" /></label>
            <label data-val="hp"><span class="o-n">02 / HP・LP</span><span class="o-t">HP / LP作成</span><span class="o-d">店舗HP・LP・コーポレート</span><input type="checkbox" name="svc" value="hp" /></label>
            <label data-val="meo"><span class="o-n">03 / MEO・AIO</span><span class="o-t">MEO / AIO運用代行</span><span class="o-d">Googleマップ・AI検索最適化</span><input type="checkbox" name="svc" value="meo" /></label>
            <label data-val="ai"><span class="o-n">04 / AI</span><span class="o-t">AI活用支援</span><span class="o-d">研修・RAG・業務エージェント</span><input type="checkbox" name="svc" value="ai" /></label>
            <label data-val="other" style="grid-column:span 2;"><span class="o-n">05 / OTHER</span><span class="o-t">その他・複合のご相談</span><span class="o-d">話してみないと分からない、でも構いません。</span><input type="checkbox" name="svc" value="other" /></label>
          </div>
          <div class="field" style="margin-top:22px;">
            <label><span>ご要望・ご相談内容</span><span class="req">必須</span></label>
            <textarea name="message" placeholder="例：3店舗運営の飲食店。Googleマップでの表示順位を上げたい。現状は3〜5位、競合は1位。" required></textarea>
            <span class="err-msg">入力してください</span>
          </div>
          <div class="row-2" style="margin-top:6px;">
            <div class="field"><label><span>希望開始時期</span></label>
              <select name="timing"><option value="">—</option><option>できるだけ早く</option><option>1ヶ月以内</option><option>1〜3ヶ月</option><option>3ヶ月以降</option><option>未定</option></select>
            </div>
            <div class="field"><label><span>当社を知ったきっかけ</span></label>
              <select name="source"><option value="">—</option><option>Google検索</option><option>SNS / X</option><option>ご紹介</option><option>既存のお客様</option><option>その他</option></select>
            </div>
          </div>
          <div class="step-nav"><span></span><button type="button" class="btn btn-primary" data-next="2">次へ<span class="arr">→</span></button></div>
        </div>

        <!-- STEP 2 -->
        <div class="step" data-step="2">
          <h2 class="step-title">ご連絡先・確認</h2>
          <p class="step-sub">1営業日以内にご返信します。</p>
          <div class="row-2">
            <div class="field"><label><span>会社名</span></label><input type="text" name="company" placeholder="株式会社◯◯" /></div>
            <div class="field"><label><span>お名前</span><span class="req">必須</span></label><input type="text" name="name" required placeholder="◯◯ ◯◯" /><span class="err-msg">入力してください</span></div>
          </div>
          <div class="row-2">
            <div class="field"><label><span>メールアドレス</span><span class="req">必須</span></label><input type="email" name="email" required placeholder="you@company.com" /><span class="err-msg">入力してください</span></div>
            <div class="field"><label><span>部署・役職（任意）</span></label><input type="text" name="role" placeholder="代表 / マーケティング部長 など" /></div>
          </div>
          <div class="review-list" id="review"></div>
          <label class="consent"><input type="checkbox" name="consent" required /><span><a href="#">プライバシーポリシー</a>に同意の上、内容を送信します。</span></label>
          <div style="position:absolute;left:-9999px;top:-9999px;" aria-hidden="true">
            <input type="text" name="_hp" tabindex="-1" autocomplete="off" />
          </div>
          <p id="sendError" style="display:none;color:var(--accent-coral);font-size:13px;font-weight:700;margin-top:14px;">送信に失敗しました。お手数ですが、時間をおいて再度お試しいただくか、<a href="https://lin.ee/yfRAgr9" target="_blank" rel="noopener" style="color:var(--blue-deep);text-decoration:underline;">LINE</a>からお問い合わせください。</p>
          <div class="step-nav">
            <button type="button" class="btn btn-ghost" data-prev="1">← 戻る</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">送信する<span class="arr">→</span></button>
          </div>
        </div>

        <!-- SUCCESS -->
        <div class="step" data-step="done">
          <div class="success">
            <div class="check">✓</div>
            <h2>送信完了しました。</h2>
            <p>1営業日以内に、代表よりご返信いたします。<br />ご相談ありがとうございました。</p>
            <div style="margin-top:30px;"><a href="index.html" class="btn btn-ghost">トップへ戻る</a></div>
          </div>
        </div>
      </form>
    </main>
  </div>
</section>

<div data-chrome="footer"></div>
<script src="assets/chrome.js"></script>
<script src="assets/kintone.js"></script>
<script>
(function () {
  const form = document.getElementById('contactForm');
  const stepEls = form.querySelectorAll('.step');
  const segs = document.querySelectorAll('#steps .seg');
  const stepCurEl = document.getElementById('stepCur');
  const stepNameEl = document.getElementById('stepName');
  const stepNames = { 1:'ご相談内容', 2:'ご連絡先', done:'送信完了' };
  let current = 1;

  const presvc = new URLSearchParams(location.search).get('svc');
  if (presvc) {
    const lbl = document.querySelector(`.svc-opts label[data-val="${presvc}"]`);
    if (lbl) { lbl.querySelector('input').checked = true; lbl.classList.add('selected'); }
  }
  document.querySelectorAll('.svc-opts label').forEach((lbl) => {
    lbl.addEventListener('click', (e) => {
      e.preventDefault();
      const cb = lbl.querySelector('input');
      cb.checked = !cb.checked;
      lbl.classList.toggle('selected', cb.checked);
    });
  });

  function go(n) {
    current = n;
    stepEls.forEach(s => s.classList.toggle('active', s.getAttribute('data-step') === String(n)));
    segs.forEach((seg, i) => {
      seg.classList.remove('cur','done');
      if (n === 'done') seg.classList.add('done');
      else if (i + 1 < n) seg.classList.add('done');
      else if (i + 1 === n) seg.classList.add('cur');
    });
    stepCurEl.textContent = n === 'done' ? '02' : String(n).padStart(2,'0');
    stepNameEl.textContent = stepNames[n];
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.querySelectorAll('[data-next]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (current === 1) {
        const ta = form.message;
        if (!ta.value.trim()) { ta.classList.add('err'); ta.parentElement.classList.add('err'); return; }
      }
      renderReview();
      go(parseInt(btn.getAttribute('data-next')));
    });
  });
  document.querySelectorAll('[data-prev]').forEach(btn => {
    btn.addEventListener('click', () => go(parseInt(btn.getAttribute('data-prev'))));
  });
  form.querySelectorAll('input, textarea').forEach(el => {
    el.addEventListener('input', () => { el.classList.remove('err'); el.parentElement.classList.remove('err'); });
  });

  function renderReview() {
    const svc = Array.from(form.querySelectorAll('input[name="svc"]:checked')).map(i => {
      const t = i.closest('label').querySelector('.o-t');
      return t ? t.textContent.trim() : i.value;
    });
    const rows = [
      { k:'ご相談', v: svc.join(' ・ ') },
      { k:'内容', v: form.message.value.trim() },
      { k:'開始時期', v: form.timing.value },
      { k:'きっかけ', v: form.source.value },
    ];
    document.getElementById('review').innerHTML = rows.map(r =>
      `<div class="rr"><span class="rk">${r.k}</span><span class="rv ${r.v ? '' : 'empty'}">${r.v || '—'}</span></div>`
    ).join('');
  }

  // 送信先: ATLAS(問い合わせ集約ツール)の公開受信API
  const ATLAS_ENDPOINT = 'https://web-production-2f388.up.railway.app/api/public-inquiries';

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let ok = true;
    ['name','email'].forEach(n => {
      const el = form[n];
      if (!el.value.trim()) { el.classList.add('err'); el.parentElement.classList.add('err'); ok = false; }
    });
    if (!form.consent.checked) { ok = false; form.consent.style.borderColor = 'var(--accent-coral)'; }
    if (!ok) return;

    const svc = Array.from(form.querySelectorAll('input[name="svc"]:checked')).map(i => {
      const t = i.closest('label').querySelector('.o-t');
      return t ? t.textContent.trim() : i.value;
    });
    const bodyLines = [
      form.message.value.trim(),
      '',
      form.timing.value ? `希望開始時期: ${form.timing.value}` : '',
      form.source.value ? `きっかけ: ${form.source.value}` : '',
      form.role.value.trim() ? `部署・役職: ${form.role.value.trim()}` : '',
    ].filter((l, i) => i === 0 || l);

    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('sendError');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '送信中…';
    try {
      const res = await fetch(ATLAS_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          source: 'TENERAMENTE HP',
          name: form.name.value.trim(),
          email: form.email.value.trim(),
          company: form.company.value.trim(),
          subject: '無料相談' + (svc.length ? '：' + svc.join('・') : ''),
          body: bodyLines.join('\n'),
          _hp: form._hp.value,
        }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      go('done');
    } catch (err) {
      console.error('[contact] send failed:', err);
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '送信する<span class="arr">→</span>';
    }
  });
})();
</script>
</body>
